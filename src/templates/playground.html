<html>
<head>
    <title>EVMap Backend Playground</title>
    <style>
        #map {
            height: 100%;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .cluster-marker {
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
            border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            min-width: 32px;
            min-height: 32px;
            padding: 2px;
        }

        .site-detail { font: 13px/1.4 monospace; max-height: 400px; overflow-y: auto; overflow-x: hidden; }
        .site-detail table { border-collapse: collapse; width: 100%; }
        .site-detail td, .site-detail th { text-align: left; padding: 2px 6px; border-bottom: 1px solid #eee; vertical-align: top; }
        .site-detail th { white-space: nowrap; color: #666; }
        .site-detail td table { width: auto; }
        .site-detail h4 { margin: 8px 0 4px; }
        .site-detail .loading { color: #999; }
        .site-detail td.utilization-cell { text-align:center; font-size:11px; padding: 2px 0px; width: 26px; }
    </style>
    <link href='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css' rel='stylesheet'/>
</head>
<body>
<div id="map"></div>
<script src='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js'></script>
<script>
    var map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/bright', // stylesheet location
        center: [9.5, 51.0], // starting position [lng, lat]
        zoom: 10 // starting zoom
    });

    function renderValue(val) {
        if (val === null || val === undefined) return '<i>null</i>';
        if (typeof val === 'string' && val.match(/^(https?:)?\/\//)) {
            return `<a href="${val}" target="_blank">${val}</a>`;
        }
        if (Array.isArray(val)) {
            if (val.length === 0) return '[]';
            // Check if it's a 2D array (utilization)
            if (Array.isArray(val[0])) return '<pre>' + JSON.stringify(val, null, 1) + '</pre>';
            return JSON.stringify(val);
        }
        if (typeof val === 'object') {
            return renderObject(val);
        }
        return String(val);
    }

    function renderObject(obj) {
        let html = '<table>';
        for (const [k, v] of Object.entries(obj)) {
            html += `<tr><th>${k}</th><td>${renderValue(v)}</td></tr>`;
        }
        html += '</table>';
        return html;
    }

    function renderDetail(data) {
        let html = '<div class="site-detail">';
        // Site-level fields (skip chargepoints/utilization for separate sections)
        html += '<table>';
        for (const [k, v] of Object.entries(data)) {
            if (k === 'chargepoints' || k === 'utilization') continue;
            html += `<tr><th>${k}</th><td>${renderValue(v)}</td></tr>`;
        }
        html += '</table>';

        // Chargepoints
        if (data.chargepoints && data.chargepoints.length > 0) {
            html += `<h4>Chargepoints (${data.chargepoints.length})</h4>`;
            data.chargepoints.forEach((cp, i) => {
                html += `<b>#${i + 1}</b>`;
                html += renderObject(cp);
            });
        }

        // Utilization
        if (data.utilization) {
            html += '<h4>Utilization</h4>';
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            html += '<table><tr><th></th>';
            for (let h = 0; h < 24; h++) html += `<th>${h}</th>`;
            html += '</tr>';
            data.utilization.forEach((row, i) => {
                html += `<tr><th>${days[i]}</th>`;
                row.forEach(v => {
                    const pct = Math.round(v * 100);
                    const bg = `hsl(${120 - pct * 1.2}, 70%, ${85 - pct * 0.3}%)`;
                    html += `<td class="utilization-cell" style="background:${bg}">${pct}</td>`;
                });
                html += '</tr>';
            });
            html += '</table>';
        }

        html += '</div>';
        return html;
    }

    const markers = new Map();
    const clusterMarkers = new Map();

    function getChargerColor(max_power) {
        if (max_power >= 100000) {
            return "#FDD835";
        } else if (max_power >= 43000) {
            return "#ff9800";
        } else if (max_power >= 20000) {
            return "#03a9f4";
        } else if (max_power >= 11000) {
            return "#9e9e9e";
        } else {
            return "#607d8b";
        }
    }

    let controller = new AbortController();

    async function updateMap() {
        // abort any pending requests
        controller.abort();
        controller = new AbortController();

        const bounds = map.getBounds();
        const zoom = map.getZoom();
        const params = new URLSearchParams();
        params.append("sw_lng", bounds.getWest());
        params.append("sw_lat", bounds.getSouth());
        params.append("ne_lng", bounds.getEast());
        params.append("ne_lat", bounds.getNorth());
        params.append("cluster_grid", 30000000 / Math.pow(2.0, Math.round(zoom) + 1));
        let response;
        try {
            response = await fetch(`/api/sites?${params}`, {signal: controller.signal});
        } catch (err) {
            if (err.name === 'AbortError') return;
            throw err;
        }
        const json = await response.json();
        const idsToDelete = new Set(markers.keys());
        json.sites.forEach((charger) => {
            if (!markers.has(charger.id)) {
                const popup = new maplibregl.Popup({maxWidth: '700px'})
                    .setHTML('<div class="site-detail"><span class="loading">Loading...</span></div>');
                popup.on('open', async () => {
                    try {
                        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                        const res = await fetch(`/api/sites/${charger.id}?tz=${encodeURIComponent(tz)}`);
                        const detail = await res.json();
                        popup.setHTML(renderDetail(detail));
                    } catch (e) {
                        popup.setHTML('<div class="site-detail">Failed to load details</div>');
                    }
                });
                const marker = new maplibregl.Marker({color: getChargerColor(charger.max_power)})
                    .setLngLat(charger.location)
                    .setPopup(popup)
                    .addTo(map);
                markers.set(charger.id, marker);
            }
            idsToDelete.delete(charger.id);
        });
        idsToDelete.forEach((id) => {
            const marker = markers.get(id);
            marker.remove();
            markers.delete(id);
        });

        const clustersToDelete = new Set(clusterMarkers.keys());
        json.clusters.forEach((cluster) => {
            if (!clusterMarkers.has(cluster.center)) {
                const el = document.createElement('div');
                el.className = 'cluster-marker';
                const size = Math.max(32, Math.min(56, 32 + Math.log10(cluster.count) * 12));
                el.style.width = size + 'px';
                el.style.height = size + 'px';
                el.style.backgroundColor = getChargerColor(cluster.max_power);
                el.textContent = cluster.count;

                const marker = new maplibregl.Marker({element: el})
                    .setLngLat(cluster.center)
                    .addTo(map);
                clusterMarkers.set(cluster.center, marker);
            }
            clustersToDelete.delete(cluster.center);
        })
        clustersToDelete.forEach((id) => {
            const marker = clusterMarkers.get(id);
            marker.remove();
            clusterMarkers.delete(id);
        });
    }

    map.on("moveend", () => {
        updateMap();
    });

    map.on("load", () => {
        updateMap();
    })


</script>
</body>
</html>
